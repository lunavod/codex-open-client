site_name: codex-open-client
site_description: Python client for OpenAI Codex — use your ChatGPT subscription for API access
repo_url: https://github.com/lunavod/codex-open-client
repo_name: lunavod/codex-open-client

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guide:
      - Authentication: guide/authentication.md
      - Responses: guide/responses.md
      - Structured Output: guide/structured-output.md
      - Streaming: guide/streaming.md
      - Tool Calls: guide/tool-calls.md
      - Models: guide/models.md
      - Error Handling: guide/error-handling.md
  - API Reference:
      - CodexClient: api/client.md
      - Types: api/types.md
      - Errors: api/errors.md
      - Stream Events: api/stream-events.md
  - Developer:
      - Internals & Research: dev/internals.md
